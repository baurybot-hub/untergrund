<!-- FILE: cabin.html - DIE KABINE (erster Raum) -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Die Kabine</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
/* === GEMEINSAME STYLES === */
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0604; font-family: 'Crimson Text', Georgia, serif; overflow: hidden; height: 100vh; }

#game { position: relative; width: 100vw; height: 100vh; overflow: hidden; }

/* Vignette */
.vignette { position: fixed; inset: 0; background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.5) 100%); pointer-events: none; z-index: 90; }

/* UI Top */
#ui-top { position: fixed; top: 0; left: 0; right: 0; padding: 20px 30px; z-index: 100; background: linear-gradient(180deg, rgba(0,0,0,0.5) 0%, transparent 100%); }
#chapter { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: #7a7570; }
#location { font-family: 'Cinzel', serif; font-size: 22px; color: #f5e6d3; text-shadow: 0 2px 8px rgba(0,0,0,0.8); }

/* Inventar */
#inventory { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; padding: 14px 20px; background: linear-gradient(180deg, rgba(45, 24, 16, 0.95), rgba(26, 14, 8, 0.98)); border: 2px solid #6b3d22; border-radius: 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.6); z-index: 100; }
.inv-slot { width: 50px; height: 50px; background: rgba(0,0,0,0.3); border: 1px solid #4a2c1a; border-radius: 6px; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
.inv-slot.has-item { border-color: #d4a84b; box-shadow: 0 0 10px rgba(212,168,75,0.3); }
.inv-item { font-size: 24px; }

/* Dialog */
#dialog { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(10px); max-width: 600px; width: 90%; padding: 20px 28px; background: linear-gradient(180deg, rgba(10,22,40,0.95), rgba(5,11,20,0.98)); border: 1px solid rgba(212,168,75,0.3); border-radius: 4px; color: #f5e6d3; font-size: 17px; line-height: 1.6; opacity: 0; visibility: hidden; transition: all 0.4s cubic-bezier(0.16,1,0.3,1); z-index: 150; text-align: center; cursor: pointer; }
#dialog.visible { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }
#dialog .speaker { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #d4a84b; margin-bottom: 10px; }

/* === KABINE SPEZIFISCH === */
.wall { position: absolute; width: 100%; height: 65%; background: repeating-linear-gradient(0deg, #3d2518 0px, #3d2518 38px, #2d1810 38px, #2d1810 40px); }
.floor { position: absolute; bottom: 0; width: 100%; height: 35%; background: linear-gradient(180deg, #4a2c1a, #2d1810 50%, #1a0f0a); }
.beam { position: absolute; width: 20px; height: 65%; background: linear-gradient(90deg, #1a0f0a, #4a2c1a, #1a0f0a); top: 0; }
.beam-1 { left: 15%; } .beam-2 { left: 45%; } .beam-3 { left: 75%; }

/* Luke */
.hatch { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 120px; height: 80px; background: linear-gradient(180deg, #1a3a5c, #2a5a8c); border: 8px solid #1a0f0a; border-radius: 8px; z-index: 2; }
.light-beam { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 200px; height: 100%; background: linear-gradient(180deg, rgba(255,240,200,0.3), rgba(255,220,150,0.1) 30%, transparent 70%); clip-path: polygon(40% 0%, 60% 0%, 75% 100%, 25% 100%); pointer-events: none; z-index: 1; }

/* Hotspot */
.hotspot { position: absolute; cursor: pointer; transition: transform 0.3s; z-index: 10; }
.hotspot:hover { transform: scale(1.05); }

/* Bett */
.bed { left: 8%; bottom: 25%; width: 220px; height: 100px; }
.bed-frame { position: absolute; bottom: 0; left: 15px; right: 15px; height: 50px; background: #4a2c1a; border-radius: 4px 4px 0 0; }
.bed-post { position: absolute; width: 15px; height: 120px; background: linear-gradient(90deg, #2d1810, #4a2c1a, #2d1810); bottom: 0; }
.bed-post-l { left: 0; } .bed-post-r { right: 0; }
.mattress { position: absolute; bottom: 10px; left: 20px; right: 20px; height: 35px; background: linear-gradient(180deg, #8B7355, #6b5344); border-radius: 6px; }
.blanket { position: absolute; bottom: 15px; left: 70px; right: 10px; height: 25px; background: linear-gradient(180deg, #6B5344, #4a3a2a); border-radius: 4px; transform: skewX(-5deg); }
.pillow { position: absolute; bottom: 18px; left: 25px; width: 45px; height: 20px; background: #a89880; border-radius: 4px; }

/* Münze */
.coin { left: 20%; bottom: 22%; display: none; animation: coinShine 2s infinite; }
.coin.found { display: block; }
@keyframes coinShine { 50% { filter: brightness(1.3) drop-shadow(0 0 8px #f5d76e); } }
.coin-body { width: 30px; height: 30px; background: radial-gradient(circle at 30% 30%, #f5d76e, #d4a84b); border-radius: 50%; border: 2px solid #b8903f; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #8a6a2f; font-size: 14px; box-shadow: 0 3px 8px rgba(0,0,0,0.4); }

/* Schiffsauge */
.eye { left: 30%; top: 28%; width: 60px; height: 60px; }
.eye-ring { width: 60px; height: 60px; border: 4px solid #d4a84b; border-radius: 50%; background: #f5f5f0; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
.eye-iris { width: 30px; height: 30px; background: radial-gradient(circle at 40% 40%, #4a8abd, #1a4a7a); border-radius: 50%; position: relative; }
.eye-pupil { width: 14px; height: 14px; background: #0a0a0a; border-radius: 50%; position: absolute; top: 8px; left: 10px; }
.eye-glint { width: 5px; height: 5px; background: #fff; border-radius: 50%; position: absolute; top: 6px; left: 16px; }

/* Tür */
.door { right: 8%; bottom: 30%; width: 80px; height: 180px; }
.door-frame { position: absolute; inset: -6px; background: #1a0f0a; border-radius: 4px; }
.door-body { position: absolute; inset: 0; background: linear-gradient(90deg, #3d2518, #4a2c1a 50%, #3d2518); border-radius: 2px; }
.door-panel { position: absolute; left: 8px; right: 8px; height: 70px; border: 2px solid #2d1810; }
.door-panel-t { top: 10px; } .door-panel-b { bottom: 10px; }
.door-handle { position: absolute; right: 15px; top: 50%; width: 14px; height: 14px; background: radial-gradient(circle at 30% 30%, #f5d76e, #d4a84b); border-radius: 50%; }
.door-lock { position: absolute; right: 12px; top: 62%; width: 20px; height: 25px; background: #2a2a2a; border-radius: 2px; }

/* Fass */
.barrel { right: 25%; bottom: 20%; width: 60px; height: 80px; }
.barrel-body { width: 60px; height: 80px; background: linear-gradient(90deg, #3d2518, #5a3a28 50%, #3d2518); border-radius: 8px; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.4); }
.barrel-band { position: absolute; left: -2px; right: -2px; height: 6px; background: linear-gradient(180deg, #4a4a4a, #2a2a2a); border-radius: 2px; }
.barrel-band-1 { top: 15%; } .barrel-band-2 { bottom: 15%; }

/* Tisch */
.table { left: 50%; bottom: 25%; width: 140px; height: 50px; }
.table-top { position: absolute; top: 0; width: 140px; height: 12px; background: linear-gradient(180deg, #5a3a28, #4a2c1a); border-radius: 2px; }
.table-leg { position: absolute; top: 12px; width: 8px; height: 38px; background: #3d2518; }
.table-leg-l { left: 10px; } .table-leg-r { right: 10px; }

/* Pirat */
.pirate { position: absolute; left: 35%; bottom: 32%; z-index: 20; }
.pirate-body { position: relative; width: 50px; height: 120px; }
.pirate-hat { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); width: 50px; height: 25px; background: #1a1a1a; border-radius: 50% 50% 0 0; }
.pirate-hat::before { content: ''; position: absolute; bottom: -4px; left: -5px; width: 60px; height: 8px; background: #1a1a1a; }
.pirate-hat::after { content: ''; position: absolute; top: 5px; right: 5px; width: 8px; height: 8px; background: #f5d76e; border-radius: 50%; }
.pirate-head { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 36px; height: 40px; background: linear-gradient(180deg, #e8c4a0, #d4a880); border-radius: 50% 50% 45% 45%; }
.pirate-eye { position: absolute; top: 14px; width: 6px; height: 6px; background: #2a2a2a; border-radius: 50%; }
.pirate-eye-l { left: 8px; } .pirate-eye-r { right: 8px; }
.pirate-mouth { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 12px; height: 6px; border: 2px solid #8a6a5a; border-top: none; border-radius: 0 0 10px 10px; }
.pirate-beard { position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%); width: 20px; height: 15px; background: #3a2a1a; border-radius: 0 0 50% 50%; }
.pirate-torso { position: absolute; top: 52px; left: 50%; transform: translateX(-50%); width: 40px; height: 45px; background: linear-gradient(180deg, #d4d4d4, #a0a0a0); border-radius: 5px 5px 0 0; }
.pirate-belt { position: absolute; bottom: 0; left: 0; right: 0; height: 8px; background: #4a3a2a; }
.pirate-legs { position: absolute; top: 97px; left: 50%; transform: translateX(-50%); width: 36px; height: 30px; display: flex; gap: 4px; }
.pirate-leg { flex: 1; background: #2d2d2d; border-radius: 0 0 3px 3px; }
.pirate-boot { position: absolute; bottom: 0; left: -2px; right: -2px; height: 10px; background: #1a1a1a; border-radius: 2px 2px 4px 4px; }

/* Ratte */
.rat { position: absolute; bottom: 18%; z-index: 15; cursor: pointer; }
.rat:hover { transform: scale(1.2); }
.rat-body { width: 40px; height: 20px; position: relative; }
.rat-torso { position: absolute; left: 8px; top: 5px; width: 25px; height: 12px; background: linear-gradient(180deg, #6a6a6a, #4a4a4a); border-radius: 60% 40% 40% 60%; }
.rat-head { position: absolute; right: 0; top: 3px; width: 14px; height: 10px; background: #7a7a7a; border-radius: 50% 60% 40% 50%; }
.rat-ear { position: absolute; top: -4px; width: 8px; height: 8px; background: #9a9a9a; border-radius: 50%; }
.rat-ear-l { right: 4px; } .rat-ear-r { right: -2px; top: -2px; width: 6px; height: 6px; }
.rat-eye { position: absolute; right: 3px; top: 3px; width: 3px; height: 3px; background: #111; border-radius: 50%; }
.rat-nose { position: absolute; right: -1px; top: 5px; width: 4px; height: 3px; background: #cc8888; border-radius: 50%; }
.rat-tail { position: absolute; left: -20px; top: 8px; width: 25px; height: 3px; background: #aaa; border-radius: 2px; animation: tailWag 0.3s infinite alternate; }
@keyframes tailWag { 100% { transform: rotate(20deg); } }

/* Öllampe */
.lamp { position: absolute; right: 15%; top: 25%; z-index: 10; }
.lamp-glow { position: absolute; width: 200px; height: 200px; background: radial-gradient(circle, rgba(255,180,80,0.4), transparent 70%); top: -80px; left: -70px; animation: flicker 3s infinite; }
@keyframes flicker { 50% { opacity: 0.85; } }
.lamp-body { width: 30px; height: 50px; background: linear-gradient(90deg, #6b5344, #8B7355, #6b5344); border-radius: 0 0 8px 8px; position: relative; }
.lamp-flame { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 8px; height: 15px; background: radial-gradient(ellipse, #fff, #ffdd44 40%, #ff8800); border-radius: 50%; animation: flame 0.5s infinite alternate; }
@keyframes flame { 100% { transform: translateX(-50%) scaleY(1.2) scaleX(0.9); } }

/* Tür-Pfeil (neuer Raum) */
.exit-arrow { position: absolute; right: 3%; bottom: 55%; font-size: 30px; color: #d4a84b; opacity: 0; animation: pulseArrow 2s infinite; cursor: pointer; z-index: 50; }
@keyframes pulseArrow { 50% { opacity: 1; } }
</style>
</head>
<body>

<div id="game">
  <!-- Kabine -->
  <div class="wall"></div>
  <div class="beam beam-1"></div>
  <div class="beam beam-2"></div>
  <div class="beam beam-3"></div>
  <div class="floor"></div>
  <div class="light-beam"></div>
  <div class="hatch"></div>
  
  <!-- Lampe -->
  <div class="lamp">
    <div class="lamp-glow"></div>
    <div class="lamp-body"><div class="lamp-flame"></div></div>
  </div>
  
  <!-- Schiffsauge -->
  <div class="hotspot eye" id="eye">
    <div class="eye-ring">
      <div class="eye-iris"><div class="eye-pupil"></div><div class="eye-glint"></div></div>
    </div>
  </div>
  
  <!-- Bett -->
  <div class="hotspot bed" id="bed">
    <div class="bed-post bed-post-l"></div>
    <div class="bed-post bed-post-r"></div>
    <div class="bed-frame"></div>
    <div class="mattress"></div>
    <div class="blanket"></div>
    <div class="pillow"></div>
  </div>
  
  <!-- Münze -->
  <div class="hotspot coin" id="coin"><div class="coin-body">$</div></div>
  
  <!-- Tisch -->
  <div class="hotspot table" id="table">
    <div class="table-top"></div>
    <div class="table-leg table-leg-l"></div>
    <div class="table-leg table-leg-r"></div>
  </div>
  
  <!-- Fass -->
  <div class="hotspot barrel" id="barrel">
    <div class="barrel-body">
      <div class="barrel-band barrel-band-1"></div>
      <div class="barrel-band barrel-band-2"></div>
    </div>
  </div>
  
  <!-- Tür -->
  <div class="hotspot door" id="door">
    <div class="door-frame"></div>
    <div class="door-body">
      <div class="door-panel door-panel-t"></div>
      <div class="door-panel door-panel-b"></div>
      <div class="door-handle"></div>
      <div class="door-lock"></div>
    </div>
  </div>
  
  <!-- Pirat -->
  <div class="pirate">
    <div class="pirate-body">
      <div class="pirate-hat"></div>
      <div class="pirate-head">
        <div class="pirate-eye pirate-eye-l"></div>
        <div class="pirate-eye pirate-eye-r"></div>
        <div class="pirate-mouth"></div>
        <div class="pirate-beard"></div>
      </div>
      <div class="pirate-torso"><div class="pirate-belt"></div></div>
      <div class="pirate-legs">
        <div class="pirate-leg"><div class="pirate-boot"></div></div>
        <div class="pirate-leg"><div class="pirate-boot"></div></div>
      </div>
    </div>
  </div>
  
  <!-- Ratte -->
  <div class="rat" id="rat">
    <div class="rat-body">
      <div class="rat-tail"></div>
      <div class="rat-torso"></div>
      <div class="rat-head">
        <div class="rat-ear rat-ear-l"></div>
        <div class="rat-ear rat-ear-r"></div>
        <div class="rat-eye"></div>
        <div class="rat-nose"></div>
      </div>
    </div>
  </div>
  
  <!-- Ausgang -->
  <div class="exit-arrow" id="exit-deck">→</div>
  
  <div class="vignette"></div>
</div>

<div id="ui-top">
  <div id="chapter">Kapitel I</div>
  <div id="location">Die Kabine</div>
</div>

<div id="inventory">
  <div class="inv-slot"></div>
  <div class="inv-slot"></div>
  <div class="inv-slot"></div>
  <div class="inv-slot"></div>
  <div class="inv-slot"></div>
</div>

<div id="dialog">
  <div class="speaker" id="speaker"></div>
  <div id="text"></div>
</div>

<script src="engine.html"></script>
<script>
// === SPIEL-LOGIK ===
const E = GameEngine;

// Inventar laden
E.renderInventory();

// Ratte bewegen
let ratX = 200;
let ratTarget = 500;
function moveRat() {
  if (Math.abs(ratTarget - ratX) > 5) {
    ratX += 1.5 * Math.sign(ratTarget - ratX);
  } else {
    ratTarget = 150 + Math.random() * (window.innerWidth - 300);
  }
  document.getElementById('rat').style.left = ratX + 'px';
  requestAnimationFrame(moveRat);
}
moveRat();

// === INTERAKTIONEN ===

// Bett
document.getElementById('bed').onclick = async () => {
  if (!E.getFlag('coinFound')) {
    await E.showDialog('Kapitän Salzwasser', 'Ein altes Bett. Ich schaue mal darunter... Da glitzert etwas!');
    E.setFlag('coinFound');
    document.getElementById('coin').classList.add('found');
  } else if (!E.hasItem('🪙')) {
    await E.showDialog('Kapitän Salzwasser', 'Die Münze liegt noch dort.');
  } else {
    await E.showDialog('Kapitän Salzwasser', 'Nur Staub hier.');
  }
};

// Münze
document.getElementById('coin').onclick = async (e) => {
  e.stopPropagation();
  if (!E.hasItem('🪙')) {
    E.addItem('🪙', 'Goldmünze');
    E.renderInventory();
    document.getElementById('coin').style.display = 'none';
    await E.showDialog('Kapitän Salzwasser', 'Eine Goldmünze! Die könnte nützlich sein.');
  }
};

// Schiffsauge
document.getElementById('eye').onclick = async () => {
  await E.showDialog('Kapitän Salzwasser', 'Das Schiffsauge meines alten Schiffes. Es starrt mich an, als wüsste es etwas.');
};

// Tür
document.getElementById('door').onclick = async () => {
  if (E.hasItem('🗝️')) {
    E.removeItem('🗝️');
    E.gotoRoom('deck');
  } else {
    await E.showDialog('Kapitän Salzwasser', 'Verschlossen. Ich brauche einen Schlüssel.');
  }
};

// Fass
document.getElementById('barrel').onclick = async () => {
  if (!E.getFlag('barrelChecked')) {
    E.setFlag('barrelChecked');
    E.addItem('🗝️', 'Rostiger Schlüssel');
    E.renderInventory();
    await E.showDialog('Kapitän Salzwasser', 'In dem Fass... ein rostiger Schlüssel! Der könnte zur Tür passen.');
  } else {
    await E.showDialog('Kapitän Salzwasser', 'Das Fass ist leer jetzt.');
  }
};

// Tisch
document.getElementById('table').onclick = async () => {
  await E.showDialog('Kapitän Salzwasser', 'Eine alte Karte. "Rum, Zwieback, mehr Rum."');
};

// Ratte
document.getElementById('rat').onclick = async () => {
  await E.showDialog('Kapitän Salzwasser', 'Eine Ratte! Sie sieht mich an, als wäre ich der Eindringling hier.');
};

// Ausgang (nur wenn Tür offen)
document.getElementById('exit-deck').onclick = () => {
  if (E.getFlag('doorOpen')) {
    E.gotoRoom('deck');
  }
};

// Start-Dialog
setTimeout(async () => {
  if (!E.getFlag('introSeen')) {
    E.setFlag('introSeen');
    await E.showDialog('Kapitän Salzwasser', 'Mein Kopf... Wo bin ich? Eine Schiffskabine. Ich sollte mich hier umsehen.');
  }
}, 500);
</script>

</body>
</html>
